services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: el_triunfo
      POSTGRES_USER: el_triunfo
      POSTGRES_PASSWORD: local_change_me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U el_triunfo -d el_triunfo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
